name: foxitscanner
description: Foxit Scanner - Scanner Dokumen dengan OCR & AI
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  
  # Camera & Image
  camera: ^0.10.5+9
  image_picker: ^1.1.2
  image: ^4.1.7
  
  # Edge Detection & Image Processing
  edge_detection: ^1.0.6
  
  # PDF Generation
  pdf: ^3.11.1
  printing: ^5.13.1
  path_provider: ^2.1.3
  
  # OCR - Google ML Kit
  google_mlkit_text_recognition: ^0.13.1
  
  # AdMob
  google_mobile_ads: ^5.1.0
  
  # Storage & File Management
  shared_preferences: ^2.3.2
  sqflite: ^2.3.3+1
  share_plus: ^10.0.2
  open_filex: ^4.6.0
  permission_handler: ^11.3.1
  
  # UI
  flutter_svg: ^2.0.10+1
  lottie: ^3.1.2
  shimmer: ^3.0.0
  cupertino_icons: ^1.0.8
  intl: ^0.19.0
  uuid: ^4.4.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  flutter_launcher_icons: ^0.14.1

flutter_launcher_icons:
  android: true
  ios: false
  image_path: "assets/icons/app_icon.png"
  min_sdk_android: 21
  adaptive_icon_background: "#E65100"
  adaptive_icon_foreground: "assets/icons/app_icon_fg.png"

flutter:
  uses-material-design: true
  assets:
    - assets/icons/
    - assets/images/
