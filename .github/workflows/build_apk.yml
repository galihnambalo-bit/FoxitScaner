name: Build & Release APK

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.22.0'
          channel: 'stable'
          cache: true

      - name: Get dependencies
        run: flutter pub get

      - name: Fix edge_detection namespace
        run: |
          EDGE_BUILD="$HOME/.pub-cache/hosted/pub.dev/edge_detection-1.1.3/android/build.gradle"
          if ! grep -q "namespace" "$EDGE_BUILD"; then
            sed -i '/^android {/a\    namespace "com.sample.edge_detection"' "$EDGE_BUILD"
          fi

      - name: Fix assets folder
        run: mkdir -p assets/images && touch assets/images/.gitkeep

      - name: Create local.properties
        run: |
          echo "flutter.sdk=$HOME/flutter" > android/local.properties
          echo "sdk.dir=$ANDROID_HOME" >> android/local.properties

      - name: Build APK Debug
        run: flutter build apk --debug --build-name="1.0.0" --build-number="${{ github.run_number }}"

      - name: Build APK Release
        run: flutter build apk --release --build-name="1.0.0" --build-number="${{ github.run_number }}" || true

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: FoxitScanner-APK
          path: |
            build/app/outputs/flutter-apk/app-debug.apk
            build/app/outputs/flutter-apk/app-release.apk
          retention-days: 30
