name: Build & Release APK

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.22.0'
          channel: 'stable'
          cache: true

      - name: Get dependencies
        run: flutter pub get

      - name: Fix assets folder
        run: mkdir -p assets/images && touch assets/images/.gitkeep

      - name: Create local.properties
        run: |
          echo "flutter.sdk=$HOME/flutter" > android/local.properties
          echo "sdk.dir=$ANDROID_HOME" >> android/local.properties

      - name: Decode Keystore
        env:
          KEY_STORE_BASE64: ${{ secrets.KEY_STORE_BASE64 }}
          STORE_PASSWORD: ${{ secrets.STORE_PASSWORD }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
        run: |
          if [ -n "$KEY_STORE_BASE64" ]; then
            echo "$KEY_STORE_BASE64" | base64 --decode > android/app/keystore.jks
            cat > android/key.properties << EOF
          storePassword=$STORE_PASSWORD
          keyPassword=$KEY_PASSWORD
          keyAlias=$KEY_ALIAS
          storeFile=keystore.jks
          EOF
            echo "✅ Keystore ready"
          else
            echo "⚠️ No keystore, release will use debug signing"
          fi

      - name: Build APK Debug
        run: flutter build apk --debug --build-name="1.0.0" --build-number="${{ github.run_number }}"

      - name: Build APK Release
        run: flutter build apk --release --build-name="1.0.0" --build-number="${{ github.run_number }}"

      - name: Build AAB PlayStore
        run: flutter build appbundle --release --build-name="1.0.0" --build-number="${{ github.run_number }}"

      - name: Rename outputs
        run: |
          mv build/app/outputs/flutter-apk/app-debug.apk build/app/outputs/flutter-apk/FoxitScanner-debug.apk
          mv build/app/outputs/flutter-apk/app-release.apk build/app/outputs/flutter-apk/FoxitScanner-release.apk

      - name: Upload Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: FoxitScanner-DEBUG
          path: build/app/outputs/flutter-apk/FoxitScanner-debug.apk
          retention-days: 30

      - name: Upload Release APK
        uses: actions/upload-artifact@v4
        with:
          name: FoxitScanner-RELEASE
          path: build/app/outputs/flutter-apk/FoxitScanner-release.apk
          retention-days: 90

      - name: Upload AAB PlayStore
        uses: actions/upload-artifact@v4
        with:
          name: FoxitScanner-AAB-PlayStore
          path: build/app/outputs/bundle/release/app-release.aab
          retention-days: 90
